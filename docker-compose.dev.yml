# SuperNote local Docker (dev) — api only
# app: host Bun/Vite on :20000
# chat: not started
# no database container (Supabase cloud)

services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    command: sh -lc "bun install && bun run dev"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "20001"
      SYSTEM_NAME: ${SYSTEM_NAME:-SuperNote}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:20000,http://127.0.0.1:20000}
    ports:
      - "${API_PORT:-20001}:20001"
    volumes:
      - ./api:/workspace/api
      - api_node_modules:/workspace/api/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:20001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - supernote-dev

volumes:
  api_node_modules:

networks:
  supernote-dev:
    driver: bridge
    name: supernote-dev
